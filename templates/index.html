<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>Food Nutrition AI Chatbot</title>
	<link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
	<link rel="stylesheet" href="https://use.fontawesome.com/releases/v6.0.0/css/all.css">
	<script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
	<script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.bundle.min.js"></script>
	<link rel="stylesheet" type="text/css" href="{{ url_for('static', filename='style.css')}}" />
</head>

<body>
	<div class="chat-container">
		<div class="chat-wrapper">
			<!-- Chat Header -->
			<div class="chat-header">
				<div class="header-content">
					<div class="bot-avatar">
						<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Bot Avatar">
						<span class="status-indicator"></span>
					</div>
					<div class="header-info">
						<h2 class="bot-name">Food Nutrition AI</h2>
						<p class="status-text">Online • Ready to help</p>
					</div>
				</div>
				<div class="header-actions">
					<button class="action-btn" title="Info"><i class="fas fa-info-circle"></i></button>
					<button class="action-btn" title="Settings"><i class="fas fa-cog"></i></button>
				</div>
			</div>

			<!-- Messages Container -->
			<div class="messages-container" id="messageFormeight">
				<div class="welcome-message">
					<div class="welcome-icon"><i class="fas fa-robot"></i></div>
					<h3>Welcome to Food Nutrition AI</h3>
					<p>Ask me anything about nutrition, health, recipes, and more!</p>
					<div class="quick-actions">
						<button class="quick-btn"
							data-query="What are the benefits of eating vegetables?">Vegetables</button>
						<button class="quick-btn" data-query="Tell me about healthy proteins">Proteins</button>
						<button class="quick-btn" data-query="What's a balanced diet?">Diet Tips</button>
					</div>
				</div>
			</div>

			<!-- Loading Indicator -->
			<div class="typing-indicator" id="typingIndicator" style="display: none;">
				<span></span>
				<span></span>
				<span></span>
			</div>

			<!-- Input Area -->
			<div class="chat-footer">
				<form id="messageArea" class="message-input-form">
					<div class="input-group-custom">
						<input type="text" id="text" name="msg" placeholder="Type your message here..."
							autocomplete="off" class="message-input" required />
						<button type="submit" id="send" class="send-button" title="Send message">
							<i class="fas fa-paper-plane"></i>
						</button>
					</div>
				</form>
			</div>
		</div>
	</div>

	<script>
		$(document).ready(function () {
			// Auto-scroll to bottom
			function scrollToBottom() {
				const messagesContainer = $("#messageFormeight");
				messagesContainer.scrollTop(messagesContainer[0].scrollHeight);
			}

			// Quick action buttons
			$(".quick-btn").on("click", function (e) {
				e.preventDefault();
				const query = $(this).data("query");
				$("#text").val(query);
				sendMessage(query);
			});

			// Handle form submission
			$("#messageArea").on("submit", function (event) {
				event.preventDefault();
				const message = $("#text").val().trim();
				if (message) {
					sendMessage(message);
				}
			});

			function sendMessage(messageText) {
				const date = new Date();
				const hour = String(date.getHours()).padStart(2, '0');
				const minute = String(date.getMinutes()).padStart(2, '0');
				const str_time = hour + ":" + minute;

				// Remove welcome message if it exists
				if ($(".welcome-message").length) {
					$(".welcome-message").remove();
				}

				// Add user message
				const userHtml = `<div class="message user-message">
					<div class="message-content">
						<p>${escapeHtml(messageText)}</p>
						<span class="message-time">${str_time}</span>
					</div>
				</div>`;

				$("#messageFormeight").append(userHtml);
				$("#text").val("");
				scrollToBottom();

				// Show typing indicator
				$("#typingIndicator").addClass("visible").show();

				console.log("Sending message:", messageText);

				// Send AJAX request
				$.ajax({
					data: { msg: messageText },
					type: "POST",
					url: "/get",
					timeout: 60000,
					dataType: "text"
				}).done(function (data) {
					// Hide typing indicator
					$("#typingIndicator").removeClass("visible").hide();

					console.log("Received response:", data);

					// Add bot message
					const botHtml = `<div class="message bot-message">
						<div class="bot-avatar-small">
							<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Bot">
						</div>
						<div class="message-content">
							<p>${data || "No response received"}</p>
							<span class="message-time">${str_time}</span>
						</div>
					</div>`;

					$("#messageFormeight").append(botHtml);
					scrollToBottom();
				}).fail(function (xhr, status, error) {
					$("#typingIndicator").removeClass("visible").hide();

					console.error("AJAX Error:", {
						status: status,
						error: error,
						statusCode: xhr.status,
						responseText: xhr.responseText,
						statusText: xhr.statusText
					});

					let errorMessage = "Sorry, I encountered an error.";

					if (status === "timeout") {
						errorMessage = "Request timed out. The server is taking too long to respond. Please ensure the Flask server is running.";
					} else if (status === "error") {
						if (xhr.status === 0) {
							errorMessage = "Connection failed. Is the server running on localhost:8080?";
						} else if (xhr.status === 500) {
							errorMessage = "Server error (500). Check server logs for details.";
						} else if (xhr.status === 404) {
							errorMessage = "Server endpoint not found (404).";
						} else {
							errorMessage = `Server error: ${xhr.status} ${xhr.statusText}`;
						}
					} else if (status === "parsererror") {
						errorMessage = "Failed to parse server response.";
					}

					const errorHtml = `<div class="message bot-message error-message">
						<div class="bot-avatar-small">
							<img src="https://cdn-icons-png.flaticon.com/512/387/387569.png" alt="Bot">
						</div>
						<div class="message-content">
							<p>${escapeHtml(errorMessage)}</p>
							<span class="message-time">${str_time}</span>
						</div>
					</div>`;
					$("#messageFormeight").append(errorHtml);
					scrollToBottom();
				});
			}

			// Utility function to escape HTML
			function escapeHtml(text) {
				const div = document.createElement('div');
				div.textContent = text;
				return div.innerHTML;
			}
		});
	</script>


</body>

</html>
